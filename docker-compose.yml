version: '3.8'

services:
  factory:
    build: .
    container_name: agentic-factory
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./sites:/app/sites
      - ./archive:/app/archive
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite:///data/factory.db
      # Add other environment variables from .env
    env_file:
      - .env
    networks:
      - factory-network
    # Optional: Resource limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 4G
    #     reservations:
    #       cpus: '1'
    #       memory: 2G

  # Optional: PostgreSQL database
  # postgres:
  #   image: postgres:15
  #   container_name: factory-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: factory
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  #     POSTGRES_DB: factory
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - factory-network

  # Optional: Redis for caching
  # redis:
  #   image: redis:7-alpine
  #   container_name: factory-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - factory-network

  # Optional: Monitoring with Prometheus
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: factory-prometheus
  #   restart: unless-stopped
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
  #     - prometheus-data:/prometheus
  #   ports:
  #     - "9090:9090"
  #   networks:
  #     - factory-network

  # Optional: Grafana for dashboards
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: factory-grafana
  #   restart: unless-stopped
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - factory-network

volumes:
  # postgres-data:
  # redis-data:
  # prometheus-data:
  # grafana-data:

networks:
  factory-network:
    driver: bridge
